name: desktop-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to, e.g. v0.8.61-desktop-beta.1"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-desktop:
    name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Desktop (macOS)
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          pnpm -C packages/nextclaw-ui build
          pnpm -C packages/nextclaw build
          CSC_IDENTITY_AUTO_DISCOVERY=false pnpm -C apps/desktop build:main
          CSC_IDENTITY_AUTO_DISCOVERY=false pnpm -C apps/desktop exec electron-builder --mac dmg zip --publish never

      - name: Build Desktop (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          pnpm -C packages/nextclaw-ui build
          pnpm -C packages/nextclaw build
          pnpm -C apps/desktop build:main
          pnpm -C apps/desktop exec electron-builder --win nsis --x64 --publish never

      - name: Upload desktop artifacts (macOS)
        if: matrix.platform == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*-mac.zip
            apps/desktop/release/latest-mac.yml
            apps/desktop/release/*.blockmap

      - name: Upload desktop artifacts (Windows)
        if: matrix.platform == 'win32'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/*Setup*.exe
            apps/desktop/release/latest.yml
            apps/desktop/release/*.exe.blockmap

  publish-release-assets:
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: [build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          path: dist/desktop-release
          merge-multiple: true

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || github.event.inputs.release_tag }}
          overwrite_files: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/desktop-release/*.dmg
            dist/desktop-release/*-mac.zip
            dist/desktop-release/*Setup*.exe
            dist/desktop-release/latest*.yml
            dist/desktop-release/*.blockmap
