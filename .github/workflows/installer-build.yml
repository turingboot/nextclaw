name: installer-build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to (for manual backfill), e.g. v0.8.41"
        required: false
        type: string
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-installers:
    name: ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install nsis -y
          $nsis = Get-Command makensis -ErrorAction SilentlyContinue
          if ($null -eq $nsis) {
            Write-Host "makensis is not on PATH after install, will fallback to absolute paths in build script."
          } else {
            Write-Host "makensis command path: $($nsis.Source)"
          }
          $candidates = @(
            "C:\\Program Files (x86)\\NSIS\\makensis.exe",
            "C:\\Program Files\\NSIS\\makensis.exe",
            "$env:ChocolateyInstall\\bin\\makensis.exe",
            "$env:ProgramData\\chocolatey\\bin\\makensis.exe"
          )
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              Write-Host "makensis candidate found: $candidate"
            }
          }

      - name: Build installer
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -e "console.log(require('./packages/nextclaw/package.json').version)")
          node scripts/installer/build-installer.mjs \
            --platform=${{ matrix.platform }} \
            --arch=${{ matrix.arch }} \
            --package-spec=nextclaw@$PACKAGE_VERSION \
            --output-dir=dist/installers

      - name: Build installer (Windows)
        id: build_windows
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path build-installer-windows.log) { Remove-Item build-installer-windows.log -Force }
          node -v | Tee-Object -FilePath build-installer-windows.log -Append
          npm -v | Tee-Object -FilePath build-installer-windows.log -Append
          where.exe makensis | Tee-Object -FilePath build-installer-windows.log -Append
          $PACKAGE_VERSION = node -e "console.log(require('./packages/nextclaw/package.json').version)"
          $env:NEXTCLAW_INSTALLER_PACKAGE_SPEC = "nextclaw@$PACKAGE_VERSION"
          & node scripts/installer/build-installer.mjs "--platform=${{ matrix.platform }}" "--arch=${{ matrix.arch }}" "--output-dir=dist/installers" 2>&1 | Tee-Object -FilePath build-installer-windows.log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows build log artifact
        if: runner.os == 'Windows' && always()
        uses: actions/upload-artifact@v4
        with:
          name: nextclaw-installer-build-log-${{ matrix.platform }}-${{ matrix.arch }}
          path: build-installer-windows.log
          if-no-files-found: warn

      - name: Upload installer artifacts (macOS)
        if: matrix.platform == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: nextclaw-installer-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/installers/*-beta-macos-${{ matrix.arch }}-installer.pkg
            dist/installers/manifest-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload installer artifacts (Windows)
        if: matrix.platform == 'win32' && steps.build_windows.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nextclaw-installer-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/installers/*-beta-windows-${{ matrix.arch }}-installer.exe
            dist/installers/manifest-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Fail when Windows installer build failed
        if: runner.os == 'Windows' && steps.build_windows.outcome == 'failure'
        shell: pwsh
        run: |
          throw "Build installer (Windows) failed. See uploaded log artifact."

  publish-release-assets:
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: [build-installers]
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nextclaw-installer-*
          path: dist/installers
          merge-multiple: true

      - name: Upload installers to release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || github.event.inputs.release_tag }}
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
          files: |
            dist/installers/*.pkg
            dist/installers/manifest-*.json
