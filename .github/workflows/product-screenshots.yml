name: Product Screenshot Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: product-screenshot-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium --with-deps

      - name: Refresh product screenshots
        run: REAL_MARKETPLACE=1 pnpm screenshots:refresh

      - name: Show changed screenshot files
        run: |
          git status --short images/screenshots apps/landing/public || true

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/auto-refresh-product-screenshots
          delete-branch: true
          title: "chore(screenshots): refresh product screenshots"
          commit-message: "chore(screenshots): refresh product screenshots"
          body: |
            Auto-generated by `product-screenshots.yml`.

            - Run `pnpm screenshots:refresh`
            - Update website/GitHub screenshot assets
          add-paths: |
            images/screenshots/**
            apps/landing/public/nextclaw-chat-page-*.png
            apps/landing/public/nextclaw-providers-page-*.png
            apps/landing/public/nextclaw-channels-page-*.png
            apps/landing/public/nextclaw-skills-doc-browser-*.png
