name = "nextclaw-provider-gateway-api"
main = "src/main.ts"
compatibility_date = "2026-03-07"
routes = [
  { pattern = "ai-gateway-api.nextclaw.io", custom_domain = true },
  "*.claw.cool/*"
]

[observability]
enabled = true

[[d1_databases]]
binding = "NEXTCLAW_PLATFORM_DB"
database_name = "nextclaw-platform"
database_id = "748845b9-8f96-4862-87e9-c10e7c478a70"

[[durable_objects.bindings]]
name = "NEXTCLAW_REMOTE_RELAY"
class_name = "NextclawRemoteRelayDurableObject"

[[durable_objects.bindings]]
name = "NEXTCLAW_REMOTE_QUOTA"
class_name = "NextclawRemoteQuotaDurableObject"

[[migrations]]
tag = "remote-access-v1"
new_sqlite_classes = ["NextclawRemoteRelayDurableObject"]

[[migrations]]
tag = "remote-quota-v1"
new_sqlite_classes = ["NextclawRemoteQuotaDurableObject"]

[vars]
DASHSCOPE_API_BASE = "https://dashscope.aliyuncs.com/compatible-mode/v1"
NEXTCLAW_WEB_BASE_URL = "https://platform.nextclaw.io"
REMOTE_ACCESS_BASE_DOMAIN = "claw.cool"
PLATFORM_AUTH_EMAIL_PROVIDER = "resend"
PLATFORM_AUTH_EMAIL_FROM = "NextClaw <no-reply@mail.nextclaw.io>"
GLOBAL_FREE_USD_LIMIT = "20"
REQUEST_FLAT_USD_PER_REQUEST = "0.0002"
REMOTE_QUOTA_SESSION_REQUESTS_PER_MINUTE = "180"
REMOTE_QUOTA_INSTANCE_CONNECTIONS = "100"
REMOTE_PLATFORM_DAILY_WORKER_REQUEST_BUDGET = "100000"
REMOTE_PLATFORM_DAILY_DO_REQUEST_BUDGET = "100000"
REMOTE_PLATFORM_DAILY_RESERVE_PERCENT = "20"
REMOTE_QUOTA_USER_DAILY_WORKER_REQUEST_UNITS = "1200"
REMOTE_QUOTA_USER_DAILY_DO_REQUEST_UNITS = "6000"
REMOTE_QUOTA_WS_MESSAGE_LEASE_SIZE = "10"
